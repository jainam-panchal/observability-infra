stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
    metadata_slo:
      duration_slo: 5s
      throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

metrics_generator:
  ring:
    kvstore:
      store: inmemory
  storage:
    path: /var/tempo/generator/wal
  processor:
    local_blocks: {}
    span_metrics:
      dimensions:
        - service.name
        - service.version
        - deployment.environment.name
        - service.role
    service_graphs:
      dimensions:
        - service.name
        - deployment.environment.name

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    metrics_generator:
      processors:
        - local-blocks
        - span-metrics
        - service-graphs

usage_report:
  reporting_enabled: false
