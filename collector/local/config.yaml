extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  filelog:
    include:
      - /var/lib/docker/containers/*/*-json.log
    start_at: end
    poll_interval: ${env:LOCAL_LOG_POLL_INTERVAL}
    include_file_path: true
    include_file_name: false
    operators:
      - id: container-json-parser
        type: json_parser
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%fZ"
      - id: container-log-body
        type: move
        from: attributes.log
        to: body
      - id: app-json-parser
        type: json_parser
        parse_from: body
        if: body matches "^\\{"
        on_error: send_quiet
      - id: container-id-extractor
        type: regex_parser
        parse_from: attributes["log.file.path"]
        regex: '^/var/lib/docker/containers/(?P<container_id>[^/]+)/'
      - id: container-id-resource
        type: move
        from: attributes.container_id
        to: resource["container.id"]
      - id: app-service-resource
        type: move
        from: attributes.service
        to: resource["service.name"]
        if: attributes.service != nil
      - id: app-environment-resource
        type: move
        from: attributes.deployment_environment
        to: resource["deployment.environment.name"]
        if: attributes.deployment_environment != nil
      - id: app-environment-name-resource
        type: move
        from: attributes.deployment_environment_name
        to: resource["deployment.environment.name"]
        if: attributes.deployment_environment_name != nil
      - id: app-service-role-resource
        type: move
        from: attributes.service_role
        to: resource["service.role"]
        if: attributes.service_role != nil

  filelog/app:
    include:
      - /var/telemetry-logs/*.log
    start_at: end
    poll_interval: ${env:LOCAL_LOG_POLL_INTERVAL}
    include_file_path: true
    operators:
      - id: app-log-json-parser
        type: json_parser
        parse_from: body
        on_error: send_quiet
      - id: app-service-resource-direct
        type: move
        from: attributes.service
        to: resource["service.name"]
        if: attributes.service != nil
      - id: app-environment-resource-direct
        type: move
        from: attributes.deployment_environment
        to: resource["deployment.environment.name"]
        if: attributes.deployment_environment != nil
      - id: app-environment-name-resource-direct
        type: move
        from: attributes.deployment_environment_name
        to: resource["deployment.environment.name"]
        if: attributes.deployment_environment_name != nil
      - id: app-service-role-resource-direct
        type: move
        from: attributes.service_role
        to: resource["service.role"]
        if: attributes.service_role != nil

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  resource:
    attributes:
      - key: host.name
        value: ${env:HOST_NAME}
        action: upsert
      - key: host.id
        value: ${env:HOST_ID}
        action: upsert
      - key: cloud.provider
        value: aws
        action: upsert

  batch/default:
    send_batch_size: 1024
    timeout: ${env:LOCAL_DEFAULT_BATCH_TIMEOUT}

  batch/logs:
    send_batch_size: 128
    timeout: ${env:LOCAL_LOG_BATCH_TIMEOUT}

exporters:
  otlp:
    endpoint: ${env:CENTRAL_OTLP_ENDPOINT}
    tls:
      insecure: ${env:CENTRAL_OTLP_INSECURE}

service:
  extensions:
    - health_check

  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource
        - batch/default
      exporters:
        - otlp

    metrics:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource
        - batch/default
      exporters:
        - otlp

    logs:
      receivers:
        - filelog
        - filelog/app
      processors:
        - memory_limiter
        - resource
        - batch/logs
      exporters:
        - otlp
