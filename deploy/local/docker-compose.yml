services:
  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib}
    container_name: local-otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    env_file:
      - .env
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ../../collector/local/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - local-observability

networks:
  local-observability:
    name: local-observability
