services:
  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib}
    container_name: local-otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    environment:
      CENTRAL_OTLP_ENDPOINT: ${CENTRAL_OTLP_ENDPOINT}
      CENTRAL_OTLP_INSECURE: ${CENTRAL_OTLP_INSECURE}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT}
      HOST_NAME: ${HOST_NAME}
      HOST_ID: ${HOST_ID}
      LOCAL_DEFAULT_BATCH_TIMEOUT: ${LOCAL_DEFAULT_BATCH_TIMEOUT}
      LOCAL_LOG_BATCH_TIMEOUT: ${LOCAL_LOG_BATCH_TIMEOUT}
      LOCAL_LOG_POLL_INTERVAL: ${LOCAL_LOG_POLL_INTERVAL}
    ports:
      - "14317:4317"
      - "14318:4318"
      - "11333:13133"
    volumes:
      - ../../collector/local/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /tmp/observability-logs:/var/telemetry-logs:ro
    networks:
      - local-observability

networks:
  local-observability:
    name: local-observability
