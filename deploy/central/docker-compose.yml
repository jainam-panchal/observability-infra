services:
  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib}
    container_name: observability-otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    environment:
      LOKI_PUSH_ENDPOINT: ${LOKI_PUSH_ENDPOINT:-http://loki:3100/loki/api/v1/push}
      TEMPO_OTLP_ENDPOINT: ${TEMPO_OTLP_ENDPOINT:-tempo:4317}
      TEMPO_OTLP_INSECURE: ${TEMPO_OTLP_INSECURE:-true}
      CENTRAL_DEFAULT_BATCH_TIMEOUT: ${CENTRAL_DEFAULT_BATCH_TIMEOUT:-5s}
      CENTRAL_LOG_BATCH_TIMEOUT: ${CENTRAL_LOG_BATCH_TIMEOUT:-250ms}
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "13133:13133"
    volumes:
      - ../../collector/central/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus}
    container_name: observability-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
    ports:
      - "9090:9090"
    volumes:
      - ../../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../prometheus/alert-rules.yml:/etc/prometheus/rules/alert-rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability

  loki:
    image: ${LOKI_IMAGE:-grafana/loki}
    container_name: observability-loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ../../loki/config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - observability

  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo}
    container_name: observability-tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo.yaml
    ports:
      - "3200:3200"
    volumes:
      - ../../tempo/config.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - observability

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana}
    container_name: observability-grafana
    restart: unless-stopped
    ports:
      - "3300:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability

networks:
  observability:
    name: observability

volumes:
  grafana-data:
  loki-data:
  prometheus-data:
  tempo-data:
