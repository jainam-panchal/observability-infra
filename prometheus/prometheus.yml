global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: central-otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

