groups:
  - name: observability-platform
    interval: 30s
    rules:
      - alert: CentralCollectorDown
        expr: up{job="central-otel-collector"} == 0
        for: 2m
        labels:
          severity: critical
          component: otel-collector
        annotations:
          summary: Central OpenTelemetry Collector is down
          description: Prometheus has been unable to scrape the central collector for more than 2 minutes.

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
          component: prometheus
        annotations:
          summary: Prometheus is down
          description: Prometheus self-scrape has failed for more than 2 minutes.

  - name: go-service-baseline
    interval: 30s
    rules:
      - alert: GoServiceHighErrorRate
        expr: |
          (
            sum by (service, deployment_environment) (
              rate(http_server_request_count{http_response_status_code=~"5.."}[5m])
            )
            /
            sum by (service, deployment_environment) (
              rate(http_server_request_count[5m])
            )
          ) > 0.01
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Go service error rate is above 1%
          description: Service {{ $labels.service }} in {{ $labels.deployment_environment }} has sustained 5xx errors above 1% for 10 minutes.

      - alert: GoServiceHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (service, deployment_environment, le) (
              rate(http_server_request_duration_bucket[5m])
            )
          ) > 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Go service p95 latency is above 1s
          description: Service {{ $labels.service }} in {{ $labels.deployment_environment }} has p95 request latency above 1 second for 10 minutes.

